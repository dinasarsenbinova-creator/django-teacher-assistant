<!-- Quick add modal для создания предметов и групп -->
<div id="quickAddModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:2rem; border-radius:8px; min-width:400px;">
        <h3 id="modalTitle">Создать предмет</h3>
        <form id="quickAddForm" style="display:flex; flex-direction:column; gap:1rem;">
            {% csrf_token %}
            <input type="hidden" id="formType" name="formType" value="subject">
            <input type="text" id="itemName" name="name" placeholder="Название" required style="padding:0.5rem; border:1px solid #ccc; border-radius:3px;">
            <input type="hidden" id="itemYear" name="year" value="">
            <div style="display:flex; gap:0.5rem;">
                <button type="submit" style="flex:1; background:#27ae60; color:white; border:none; padding:0.5rem; border-radius:3px; cursor:pointer;">Добавить</button>
                <button type="button" onclick="closeQuickAdd()" style="flex:1; background:#95a5a6; color:white; border:none; padding:0.5rem; border-radius:3px; cursor:pointer;">Отмена</button>
            </div>
            <div id="modalError" style="color:#e74c3c; display:none;"></div>
        </form>
    </div>
</div>

<script>
async function parseQuickAddResponse(response) {
    const contentType = (response.headers.get('content-type') || '').toLowerCase();
    if (contentType.includes('application/json')) {
        const data = await response.json();
        return { status: response.status, data, rawText: '' };
    }
    const rawText = await response.text();
    return { status: response.status, data: null, rawText };
}

function quickAddHtmlError(status, rawText) {
    const compact = (rawText || '').replace(/\s+/g, ' ').toLowerCase();
    if (compact.includes('csrf')) return 'Ошибка CSRF. Обновите страницу и повторите.';
    if (compact.includes('login') || compact.includes('sign in')) return 'Сессия истекла. Войдите снова.';
    return `Сервер вернул не-JSON ответ (HTTP ${status})`;
}

function openQuickAddSubject() {
    document.getElementById('formType').value = 'subject';
    document.getElementById('modalTitle').textContent = 'Создать предмет';
    document.getElementById('itemName').placeholder = 'Название предмета';
    document.getElementById('itemYear').style.display = 'none';
    document.getElementById('quickAddModal').style.display = 'block';
    document.getElementById('itemName').focus();
}

function openQuickAddGroup() {
    document.getElementById('formType').value = 'group';
    document.getElementById('modalTitle').textContent = 'Создать группу';
    document.getElementById('itemName').placeholder = 'Название группы';
    document.getElementById('itemYear').style.display = 'block';
    document.getElementById('quickAddModal').style.display = 'block';
    document.getElementById('itemName').focus();
}

function closeQuickAdd() {
    document.getElementById('quickAddModal').style.display = 'none';
    document.getElementById('quickAddForm').reset();
    document.getElementById('modalError').style.display = 'none';
}

document.getElementById('quickAddForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formType = document.getElementById('formType').value;
    const name = document.getElementById('itemName').value.trim();
    const year = document.getElementById('itemYear').value;
    
    if (!name) {
        document.getElementById('modalError').textContent = 'Заполните название';
        document.getElementById('modalError').style.display = 'block';
        return;
    }
    
    const endpoint = formType === 'subject' 
        ? '/teacher/api/subject/create/' 
        : '/teacher/api/group/create/';
    
    const formData = new FormData();
    formData.append('name', name);
    if (formType === 'group' && year) {
        formData.append('year', year);
    }
    
    fetch(endpoint, {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: formData
    })
    .then(parseQuickAddResponse)
    .then(result => {
        if (!result.data) {
            document.getElementById('modalError').textContent = quickAddHtmlError(result.status, result.rawText);
            document.getElementById('modalError').style.display = 'block';
            return;
        }

        const data = result.data;

        if (result.status === 401 || data.login_url) {
            window.location.href = data.login_url || '/accounts/login/';
            return;
        }

        if (data.success) {
            // Добавляем новый элемент в селект (если возможно)
            const selectSelector = formType === 'subject'
                ? 'select[name="subject"]'
                : 'select[name="class_name"], select[name="student_group"]';
            const selects = document.querySelectorAll(selectSelector);
            selects.forEach(select => {
                const newOption = document.createElement('option');
                newOption.value = data.id;
                newOption.textContent = data.name;
                newOption.selected = true;
                select.appendChild(newOption);
            });
            
            closeQuickAdd();
            alert(`${formType === 'subject' ? 'Предмет' : 'Группа'} добавлена!`);
        } else {
            document.getElementById('modalError').textContent = data.error || 'Ошибка сохранения';
            document.getElementById('modalError').style.display = 'block';
        }
    })
    .catch(error => {
        document.getElementById('modalError').textContent = 'Ошибка сети: ' + error;
        document.getElementById('modalError').style.display = 'block';
    });
});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
